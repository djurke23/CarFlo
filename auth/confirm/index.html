<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>CarFlo - Email potvrđen</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 16px;
        }
        p {
            font-size: 16px;
            color: #ccc;
            margin-bottom: 24px;
        }
        #fallback {
            display: none;
            background-color: #333;
            color: #fff;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            font-size: 16px;
            transition: background-color 0.2s;
        }
        #fallback:active {
            background-color: #444;
        }
    </style>
</head>
<body>
    <h1>✅ Email potvrđen</h1>
    <p>Uspešno si potvrdio nalog. Otvaram CarFlo aplikaciju...</p>
    <a id="fallback" href="#">Ako se aplikacija ne otvori, klikni ovde</a>

    <script>
        const params = window.location.search + window.location.hash;
        const deepLink = "carflo://auth/confirm" + params;
        
        const fallbackBtn = document.getElementById('fallback');
        fallbackBtn.href = deepLink;

        setTimeout(() => {
            window.location.href = deepLink;
        }, 500);

        setTimeout(() => {
            fallbackBtn.style.display = 'inline-block';
        }, 2000);
    </script>
</body>
</html>
